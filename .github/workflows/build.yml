name: Build unsigned package

on:
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# Windows-only smoke package. Mac unsigned builds hit Gatekeeper and aren't
# useful for QA — use Publish with codesign for signed/notarized Mac.
# Native modules cannot be cross-compiled; keep this on windows-2022.
jobs:
  setup_and_build:
    runs-on: windows-2022
    defaults:
      run:
        shell: bash

    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout Books
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn

      - name: Run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_NOTARIZE: 0
          # Same prod API origin as Publish so unsigned smoke builds aren't stuck on localhost.
          LIVEBOOKS_CLOUD_ORIGIN: ${{ secrets.LIVEBOOKS_CLOUD_ORIGIN }}
          VITE_LIVEBOOKS_CLOUD_ORIGIN: ${{ secrets.LIVEBOOKS_CLOUD_ORIGIN }}
        run: |
          if [ -z "$LIVEBOOKS_CLOUD_ORIGIN" ]; then
            echo "::error::LIVEBOOKS_CLOUD_ORIGIN secret is unset; refusing to bake localhost into a CI test build."
            exit 1
          fi
          yarn build --win --nosign --publish never

      - name: Upload unsigned installers
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-x64
          path: |
            dist_electron/bundled/*.exe
          if-no-files-found: error
          retention-days: 14
