name: Build unsigned package

on:
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# Native modules (better-sqlite3) cannot be cross-compiled by node-gyp.
# Build each OS on a matching runner — never -mw on a single host.
jobs:
  setup_and_build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_args: --mac --arm64
            artifact_name: unsigned-mac-arm64
            # dmg is the usual install path; zip is the electron-builder fallback archive
            artifact_glob: |
              dist_electron/bundled/*.dmg
              dist_electron/bundled/*.zip
          - os: windows-2022
            build_args: --win
            artifact_name: unsigned-windows-x64
            artifact_glob: |
              dist_electron/bundled/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout Books
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn

      - name: Run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_NOTARIZE: 0
          # Same prod API origin as Publish so unsigned smoke builds aren't stuck on localhost.
          LIVEBOOKS_CLOUD_ORIGIN: ${{ secrets.LIVEBOOKS_CLOUD_ORIGIN }}
          VITE_LIVEBOOKS_CLOUD_ORIGIN: ${{ secrets.LIVEBOOKS_CLOUD_ORIGIN }}
        run: |
          if [ -z "$LIVEBOOKS_CLOUD_ORIGIN" ]; then
            echo "::error::LIVEBOOKS_CLOUD_ORIGIN secret is unset; refusing to bake localhost into a CI test build."
            exit 1
          fi
          yarn build ${{ matrix.build_args }} --nosign --publish never

      - name: Upload unsigned installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
