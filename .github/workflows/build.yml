name: Build unsigned package

on:
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

# Native modules (better-sqlite3) cannot be cross-compiled by node-gyp.
# Build each OS on a matching runner — never -mw on a single host.
jobs:
  setup_and_build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_args: --mac --arm64
          - os: windows-2022
            build_args: --win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout Books
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn

      - name: Run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_NOTARIZE: 0
        run: yarn build ${{ matrix.build_args }} --nosign --publish never
