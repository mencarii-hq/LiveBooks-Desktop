name: Publish with codesign (Mac)

on: workflow_dispatch

# contents: electron-builder GitHub release upload
permissions:
  contents: write

# MVP: macOS Apple Silicon only. Re-add Intel when demand justifies it.

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      # node-gyp (better-sqlite3 / electron-rebuild) still imports distutils,
      # which was removed in Python 3.12+. Pin 3.11 so rebuild works on macos-latest.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout Books
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn

      - name: Set Error Log Creds
        env:
          ERR_LOG_KEY: ${{ secrets.ERR_LOG_KEY }}
          ERR_LOG_URL: ${{ secrets.ERR_LOG_URL }}
          ERR_LOG_SECRET: ${{ secrets.ERR_LOG_SECRET }}
          TELEMETRY_URL: ${{ secrets.TELEMETRY_URL }}
        run: |
          # MVP: remote error/telemetry logging is optional. Missing secrets ship
          # an empty log_creds.txt; runtime disables sendBeacon until configured.
          missing=""
          for var in ERR_LOG_KEY ERR_LOG_SECRET ERR_LOG_URL TELEMETRY_URL; do
            if [ -z "${!var}" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::warning::Error/telemetry log secrets missing:$missing — publishing without remote logging."
            : > log_creds.txt
            exit 0
          fi
          case "$ERR_LOG_URL" in
            https://*) ;;
            *)
              echo "::error::ERR_LOG_URL must be an https:// URL (got non-https value)."
              exit 1
              ;;
          esac
          case "$TELEMETRY_URL" in
            https://*) ;;
            *)
              echo "::error::TELEMETRY_URL must be an https:// URL (got non-https value)."
              exit 1
              ;;
          esac
          # Quoted printf keeps empty/special values from shifting fields in log_creds.txt
          printf '%s\n' "$ERR_LOG_KEY" > log_creds.txt
          printf '%s\n' "$ERR_LOG_SECRET" >> log_creds.txt
          printf '%s\n' "$ERR_LOG_URL" >> log_creds.txt
          printf '%s\n' "$TELEMETRY_URL" >> log_creds.txt
          if [ "$(grep -c . log_creds.txt)" -ne 4 ]; then
            echo "::error::log_creds.txt must contain exactly 4 nonempty lines."
            exit 1
          fi

      # Fail fast if any mac signing / notarization secret is missing.
      # An unsigned or non-notarized build under the frozen productName +
      # appId would roll every user's safeStorage keychain slot on first launch.
      - name: Assert macOS signing identity secrets are present
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          missing=""
          for var in APPLE_ID APPLE_APP_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::macOS signing/notarization secrets missing:$missing"
            echo "::error::Refusing to publish unsigned macOS build (signing identity freeze)."
            exit 1
          fi

      - name: Run build
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Official releases: set repository secret to production API origin (no trailing slash).
          LIVEBOOKS_CLOUD_ORIGIN: ${{ secrets.LIVEBOOKS_CLOUD_ORIGIN }}
          VITE_LIVEBOOKS_CLOUD_ORIGIN: ${{ secrets.LIVEBOOKS_CLOUD_ORIGIN }}
        run: yarn build --mac --arm64 --publish always

      - name: Tar files
        run: tar -cvf dist-macOS-arm.tar dist_electron

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macOS-arm
          path: dist-macOS-arm.tar
