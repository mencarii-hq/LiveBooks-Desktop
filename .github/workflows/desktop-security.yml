name: Desktop Security

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: desktop-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  socket-firewall:
    name: Socket Firewall (supply-chain)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.18.1'
          cache: 'yarn'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install Socket Firewall (free)
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with:
          mode: firewall-free

      - name: Install dependencies (through Socket Firewall)
        run: sfw yarn install --frozen-lockfile

  socket-firewall-enterprise:
    name: Socket Firewall (enterprise)
    runs-on: ubuntu-latest
    # secrets is not available in job-level if; gate on fork below, key in steps.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.fork == false

    steps:
      - name: Check Socket API key
        id: socket-key
        env:
          SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}
        run: |
          if [ -z "$SOCKET_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SOCKET_API_KEY unset; skipping enterprise Socket Firewall"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.socket-key.outputs.present == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        if: steps.socket-key.outputs.present == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.18.1'
          cache: 'yarn'

      - name: Setup Python
        if: steps.socket-key.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable Yarn
        if: steps.socket-key.outputs.present == 'true'
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install Socket Firewall (enterprise)
        if: steps.socket-key.outputs.present == 'true'
        uses: SocketDev/action@2d3f25590c6ed6ba11a9a14c064d962a3a04698f # v1.3.1
        with:
          mode: firewall-enterprise
          socket-token: ${{ secrets.SOCKET_API_KEY }}

      - name: Install dependencies (through Socket Firewall)
        if: steps.socket-key.outputs.present == 'true'
        run: sfw yarn install --frozen-lockfile

  trufflehog:
    name: TruffleHog (secret scanning)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan for verified secrets
        uses: trufflesecurity/trufflehog@ddc015e5ed99942b2253d8ea16a0586a01ef2ab1 # v3.88.0
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
          extra_args: --only-verified
