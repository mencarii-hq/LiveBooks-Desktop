<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="icon" href="./app-icon.png" type="image/png" />
  <title>LiveBooks Desktop</title>
  <!-- Boot splash copy: see src/branding.ts -->
  <style>
    @keyframes boot-splash-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .boot-splash-spinner {
      margin-top: 1.25rem;
      width: 2rem;
      height: 2rem;
      color: #15803d;
      animation: boot-splash-spin 1s linear infinite;
    }
  </style>
</head>

<body class="m-0" style="margin:0;min-height:100vh;background:#f9fafb;">
  <div id="boot-splash" style="
      position:fixed;
      inset:0;
      z-index:2147483646;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      text-align:center;
      font-family:-apple-system,system-ui,sans-serif;
      background:#f9fafb;
    ">
    <div style="font-size:1.5rem;font-weight:600;color:#15803d;">
      LiveBooks Desktop
    </div>
    <div style="
        margin-top:0.75rem;
        max-width:28rem;
        font-size:0.8125rem;
        line-height:1.45;
        color:#4b5563;
      ">
      Open source, offline-first accounting software powered by Frappe Books.
    </div>
    <svg class="boot-splash-spinner" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25" />
      <path fill="currentColor" opacity="0.75" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
    </svg>
  </div>
  <div id="app-mount"></div>
  <script type="module" src="./renderer.ts"></script>
</body>

</html>
